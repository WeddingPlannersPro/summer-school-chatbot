<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estella — Assistente Summer School 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy: #1B2A4A;
  --navy-deep: #0F1A30;
  --navy-light: #243658;
  --blue: #3A5A8C;
  --blue-mid: #4E7AB5;
  --powder: #B8CFE6;
  --powder-light: #D6E5F3;
  --powder-pale: #E8F0F7;
  --ice: #F2F7FB;
  --white: #FFFFFF;
  --silver: #8A9BB5;
  --slate: #4A5568;
  --charcoal: #2D3748;
  --sage: #7A9B8F;
  --font-display: "Cormorant Garamond", Georgia, serif;
  --font-body: "Montserrat", sans-serif;
}

html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: linear-gradient(165deg, var(--ice) 0%, var(--powder-pale) 100%);
  color: var(--charcoal);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow-x: hidden;
}

/* ── App container ─────────────────────────────────── */
.chat-app {
  width: 100%;
  max-width: 560px;
  height: 85vh;
  max-height: 780px;
  min-height: 600px;
  background: var(--white);
  border-radius: 20px;
  box-shadow: 0 24px 80px rgba(27,42,74,0.15);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

/* ── Header ────────────────────────────────────────── */
.chat-header {
  background: linear-gradient(165deg, var(--navy-deep) 0%, var(--navy) 100%);
  padding: 24px 24px 20px;
  color: var(--white);
  position: relative;
  flex-shrink: 0;
}

.chat-header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 300px 200px at 30% 30%, rgba(184,207,230,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.header-content {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 16px;
}

.avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--powder-light), var(--powder));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--navy-deep);
  flex-shrink: 0;
  position: relative;
}

.avatar::after {
  content: "";
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #4ADE80;
  border: 2px solid var(--navy-deep);
}

.header-info h1 {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 500;
  margin-bottom: 2px;
  line-height: 1.2;
}

.header-info p {
  font-size: 0.75rem;
  color: rgba(184,207,230,0.7);
  letter-spacing: 0.5px;
}

.header-logo {
  position: absolute;
  top: 16px;
  right: 20px;
  width: 64px;
  opacity: 0.9;
  z-index: 1;
}

.header-logo img {
  width: 100%;
  height: auto;
  display: block;
}

/* ── Messages area ─────────────────────────────────── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scroll-behavior: smooth;
  background: var(--ice);
}

.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--powder); border-radius: 3px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }

.msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 0.92rem;
  line-height: 1.55;
  animation: msgFadeIn 0.3s ease;
  word-wrap: break-word;
}

@keyframes msgFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-bot {
  background: var(--white);
  color: var(--charcoal);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  box-shadow: 0 2px 8px rgba(27,42,74,0.04);
}

.msg-user {
  background: linear-gradient(135deg, var(--blue-mid), var(--blue));
  color: var(--white);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.msg strong { font-weight: 600; }
.msg em { font-style: italic; }

/* ── Typing indicator ──────────────────────────────── */
.typing {
  display: flex;
  gap: 5px;
  padding: 14px 18px;
  background: var(--white);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  box-shadow: 0 2px 8px rgba(27,42,74,0.04);
}

.typing span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--powder);
  animation: typingBounce 1.4s ease-in-out infinite;
}

.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ── Quick actions / CTA ───────────────────────────── */
.quick-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
  padding: 0 20px 12px;
  flex-shrink: 0;
}

.quick-btn {
  background: var(--white);
  border: 1px solid var(--powder);
  color: var(--blue);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}

.quick-btn:hover {
  background: var(--blue);
  color: var(--white);
  border-color: var(--blue);
  transform: translateY(-1px);
}

.cta-row {
  display: flex;
  gap: 10px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.cta-btn {
  flex: 1;
  min-width: 140px;
  padding: 11px 16px;
  border-radius: 10px;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  text-decoration: none;
  text-align: center;
  font-family: var(--font-body);
  transition: all 0.25s ease;
  cursor: pointer;
  border: none;
}

.cta-free {
  background: transparent;
  border: 1.5px solid var(--sage);
  color: var(--sage);
}

.cta-free:hover {
  background: var(--sage);
  color: var(--white);
  transform: translateY(-1px);
}

.cta-vip {
  background: linear-gradient(135deg, var(--blue-mid), var(--blue));
  color: var(--white);
  box-shadow: 0 4px 12px rgba(58,90,140,0.25);
}

.cta-vip:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(58,90,140,0.35);
}

/* ── Input area ────────────────────────────────────── */
.chat-input-wrap {
  border-top: 1px solid var(--powder-pale);
  padding: 14px 16px 16px;
  background: var(--white);
  flex-shrink: 0;
}

.chat-input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.chat-input {
  flex: 1;
  border: 1.5px solid var(--powder-pale);
  border-radius: 24px;
  padding: 11px 18px;
  font-family: var(--font-body);
  font-size: 0.92rem;
  color: var(--charcoal);
  resize: none;
  outline: none;
  transition: border-color 0.2s ease;
  max-height: 100px;
  min-height: 44px;
  line-height: 1.5;
}

.chat-input:focus { border-color: var(--blue-mid); }
.chat-input::placeholder { color: var(--silver); }

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--blue-mid), var(--blue));
  color: var(--white);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(58,90,140,0.25);
}

.send-btn:hover:not(:disabled) {
  transform: scale(1.05);
  box-shadow: 0 6px 18px rgba(58,90,140,0.35);
}

.send-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.send-btn svg { width: 18px; height: 18px; }

.footer-note {
  font-size: 0.68rem;
  color: var(--silver);
  text-align: center;
  margin-top: 8px;
  letter-spacing: 0.3px;
}

/* ── Mobile ──────────────────────────────────────── */
@media (max-width: 600px) {
  body { padding: 0; }
  .chat-app {
    height: 100vh;
    max-height: none;
    min-height: 100vh;
    border-radius: 0;
    max-width: none;
  }
}
</style>

const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const quickActions = document.getElementById("quickActions");

let history = [];
let isTyping = false;

const FREE_URL = "https://weddingplannerspro.com/summerschoolbooking";
const VIP_URL = "https://weddingplannerspro.com/summer-school-vip";

// ── Welcome message ────────────────────────────────
function addWelcome() {
  const welcome = `Ciao! Sono <strong>Estella</strong>, l'assistente della Summer School 2026 di Wedding Planners Pro. ✨<br><br>Posso aiutarti a scoprire il percorso formativo di Roberta Torresan, capire qual è il livello giusto per te, o rispondere a qualsiasi domanda sul corso.<br><br>Da dove vuoi partire?`;
  addMessage(welcome, "bot");
}

// ── Add message to UI ──────────────────────────────
function addMessage(text, type, cta = false) {
  const msg = document.createElement("div");
  msg.className = `msg msg-${type}`;

  // Convert markdown-style bold/italic to HTML
  const formatted = text
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/\n/g, "<br>");

  msg.innerHTML = formatted;

  // Add CTA buttons if message suggests enrollment
  if (cta && type === "bot") {
    const ctaRow = document.createElement("div");
    ctaRow.className = "cta-row";
    ctaRow.innerHTML = `
      <a href="${FREE_URL}" target="_blank" class="cta-btn cta-free">Iscriviti Free</a>
      <a href="${VIP_URL}" target="_blank" class="cta-btn cta-vip">Scopri VIP</a>
    `;
    msg.appendChild(ctaRow);
  }

  messagesEl.appendChild(msg);
  scrollToBottom();
}

// ── Typing indicator ──────────────────────────────
function showTyping() {
  if (isTyping) return;
  isTyping = true;
  const t = document.createElement("div");
  t.className = "typing";
  t.id = "typing";
  t.innerHTML = "<span></span><span></span><span></span>";
  messagesEl.appendChild(t);
  scrollToBottom();
}

function hideTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
  isTyping = false;
}

function scrollToBottom() {
  setTimeout(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, 50);
}

// ── Detect if response should have CTAs ───────────
function shouldShowCTA(text) {
  const triggers = [
    "iscriv", "iscritt", "formula", "puoi partire", "inizia", "registrati",
    "scopri di più", "pagina di iscrizione", "accedere al corso",
    "VIP", "Free", "gratuit", "€", "prezzo"
  ];
  const t = text.toLowerCase();
  return triggers.some(trigger => t.includes(trigger.toLowerCase()));
}

// ── Send message to Claude ─────────────────────────
async function sendMessage(text) {

  // Hide quick actions after first message
  if (quickActions) {
    quickActions.style.display = "none";

  history.push({ role: "user", content: text });

  inputEl.style.height = "auto";
  sendBtn.disabled = true;

  showTyping();

  try {
    const response = await fetch("/.netlify/functions/chat", {

      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: KNOWLEDGE,
        messages: history
      })
    });

    if (!response.ok) throw new Error("Errore di rete");

    const data = await response.json();
    const botReply = data.content?.[0]?.text || "Scusa, non ho ricevuto una risposta. Riprova?";

    hideTyping();

    const withCTA = shouldShowCTA(botReply);
    addMessage(botReply, "bot", withCTA);
    history.push({ role: "assistant", content: botReply });

  } catch (err) {
    hideTyping();
    addMessage(
      "Ops, qualcosa non ha funzionato. Riprova tra un momento oppure scrivici direttamente a <strong>team@weddingplannerspro.it</strong>.",
      "bot"
    );
    console.error(err);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ── Event listeners ────────────────────────────────
sendBtn.addEventListener("click", () => {
  sendMessage(inputEl.value);
});

inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});

inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px";
});

// Quick action buttons
document.querySelectorAll(".quick-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    sendMessage(btn.dataset.q);
  });
});

// Init
addWelcome();
inputEl.focus();
</script>

</body>
</html>
